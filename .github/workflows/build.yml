name: CI

on: [push, pull_request]

jobs:
  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libasound2-dev libgl1-mesa-dev
      - name: Build with ASan
        run: |
          cmake -B build -DENABLE_ASAN=ON
          cmake --build build
      - name: Run Tests
        run: python3 tests.py

  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libasound2-dev libgl1-mesa-dev valgrind
      - name: Build
        run: |
          cmake -B build
          cmake --build build
      - name: Run Tests with Valgrind
        run: |
          export TEST_RUNNER="valgrind --leak-check=full --error-exitcode=1"
          python3 tests.py
